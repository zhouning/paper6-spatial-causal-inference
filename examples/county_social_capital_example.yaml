case_name: county_social_capital_example
input:
  path: data/county_social_capital.csv
variables:
  unit_id: FIPS
  exposure: SocialAssoc
  outcome: AveAgeDeath
  confounders:
    - UnemployRate
    - pHHinPoverty
    - pNoHealthInsur
    - MentalHealth
    - pAdultSmoking
    - pAdultObesity
    - FastFood
    - pInsufficientSleep
    - pAlcohol
    - pSuicideDeaths
    - AirPollution
context:
  columns:
    - Shape_Length
    - Shape_Area
preprocessing:
  exposure_trim:
    lower_quantile: 0.01
    upper_quantile: 0.99
robustness:
  bootstrap:
    group_column: STATE_NAME
    n_replicates: 50
  placebo_exposures:
    - name: Shape_Length
      column: Shape_Length
      role: placebo
      expected_relation: weaker_than_main
    - name: Shape_Area
      column: Shape_Area
      role: placebo
      expected_relation: weaker_than_main
targets:
  outcome_values:
    - name: target_70
      value: 70.0
output:
  directory: ../paper/ijgis_submission_20260605/07_results/examples/county_social_capital_example
